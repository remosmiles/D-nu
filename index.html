<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Crystallization - Daniela</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const fontSize = 25; // Größer für bessere Sichtbarkeit des Namens
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(0).map(() => Math.random() * -100);

        // Konfiguration des Namens
        const name = "DANIELA";
        const nameStartCol = Math.floor((columns - name.length) / 2);
        const nameRow = Math.floor((canvas.height / fontSize) / 2);

        // Speichert, welche Buchstaben bereits "kristallisiert" sind
        const crystallized = Array(name.length).fill(false);

        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$+-*/=%\"'#&_(),.;:?!\\|{}<>[]";

        function draw() {
            // Matrix-Nachzieheffekt
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = `bold ${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                let x = i * fontSize;
                let y = drops[i] * fontSize;

                // Prüfen, ob diese Spalte zu einem Buchstaben von "DANIELA" gehört
                let nameCharIndex = i - nameStartCol;
                let isNameColumn = nameCharIndex >= 0 && nameCharIndex < name.length;

                if (isNameColumn && Math.floor(drops[i]) === nameRow) {
                    // Der Moment der Kristallisation:
                    // Wir zeichnen den finalen Buchstaben in hellem Weiß/Neon
                    ctx.fillStyle = "#fff";
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#0f0";
                    ctx.fillText(name[nameCharIndex], x, nameRow * fontSize);
                    ctx.shadowBlur = 0; // Reset für andere Zeichen
                    
                    crystallized[nameCharIndex] = true;
                    
                    // Der "Regen-Tropfen" fällt einfach weiter durch
                    ctx.fillStyle = "#0f0";
                    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], x, y);
                } else {
                    // Normaler Regen
                    ctx.fillStyle = "#0f0";
                    let char = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(char, x, y);
                }

                // Wenn der Regen unten rausfällt, oben neu anfangen
                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                // Geschwindigkeit des Regens
                drops[i] += 0.5;
            }

            // Bereits kristallisierte Buchstaben dauerhaft stehen lassen
            for (let j = 0; j < name.length; j++) {
                if (crystallized[j]) {
                    ctx.fillStyle = "#fff";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#0f0";
                    ctx.fillText(name[j], (nameStartCol + j) * fontSize, nameRow * fontSize);
                    ctx.shadowBlur = 0;
                }
            }

            requestAnimationFrame(draw);
        }

        draw();

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Neukalkulation der Spalten bei Resize könnte hier folgen
        };
    </script>
</body>
</html>
